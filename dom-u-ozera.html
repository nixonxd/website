  <script>
    const plans = [
      {
        src: "дом у озера/plan_1/0.png",
        label: "План первого этажа",
        alt: "План первого этажа проекта Дом у озера"
      },
      {
        src: "дом у озера/plan_2/0.png",
        label: "План второго этажа",
        alt: "План второго этажа проекта Дом у озера"
      }
    ];

    let currentPlanIndex = 0;

    const planImage = document.getElementById("plan-image");
    const planLabel = document.getElementById("plan-label");
    const prevButton = document.getElementById("plan-prev");
    const nextButton = document.getElementById("plan-next");

    function renderPlan(index) {
      const plan = plans[index];
      planImage.src = plan.src;
      planImage.alt = plan.alt;
      planLabel.textContent = plan.label;
    }

    function showNextPlan(step) {
      currentPlanIndex = (currentPlanIndex + step + plans.length) % plans.length;
      renderPlan(currentPlanIndex);
    }

    prevButton.addEventListener("click", () => showNextPlan(-1));
    nextButton.addEventListener("click", () => showNextPlan(1));
  </script>
